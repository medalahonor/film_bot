version: '3.8'

services:
  db:
    image: postgres:16-alpine
    pull_policy: if_not_present
    environment:
      POSTGRES_DB: filmbot
      POSTGRES_USER: filmbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filmbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      pull_policy: if_not_present
    depends_on:
      db:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_IDS: ${TELEGRAM_GROUP_IDS}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS}
      DATABASE_URL: postgresql+asyncpg://filmbot:${DB_PASSWORD}@db:5432/filmbot
      BOT_URL: ${BOT_URL:-}
    volumes:
      - ./src/bot:/app/src/bot
      - ./src/alembic:/app/src/alembic
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      pull_policy: if_not_present
    depends_on:
      db:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS}
      DATABASE_URL: postgresql+asyncpg://filmbot:${DB_PASSWORD}@db:5432/filmbot
      WEBAPP_ORIGIN: https://${DOMAIN:-localhost}
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      pull_policy: if_not_present
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
