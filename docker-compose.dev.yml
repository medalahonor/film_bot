services:
  db:
    image: postgres:16-alpine
    pull_policy: if_not_present
    environment:
      POSTGRES_DB: filmbot
      POSTGRES_USER: filmbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filmbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEV_MODE: ${DEV_MODE:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DATABASE_URL: postgresql+asyncpg://filmbot:${DB_PASSWORD}@db:5432/filmbot
    volumes:
      - ./src/alembic:/app/src/alembic
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DEV_MODE: ${DEV_MODE:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-1}
      DATABASE_URL: postgresql+asyncpg://filmbot:${DB_PASSWORD}@db:5432/filmbot
      WEBAPP_ORIGIN: ${WEBAPP_ORIGIN:-http://localhost:5173}
    volumes:
      - ./src:/app/src
    ports:
      - "127.0.0.1:8000:8000"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      API_PROXY_TARGET: http://api:8000
    command: ["sh", "-c", "npm install && npm run dev -- --host"]
    depends_on:
      - api

volumes:
  postgres_dev_data:
  web_node_modules:
